<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 现代化渐变定义 -->
  <defs>
    <!-- 主背景渐变 - 深蓝到紫色 -->
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3730a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#581c87;stop-opacity:1" />
    </linearGradient>
    
    <!-- 文档背景渐变 -->
    <linearGradient id="docBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    
    <!-- 智能元素渐变 -->
    <linearGradient id="smartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    
    <!-- 高级阴影滤镜 -->
    <filter id="docShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="12" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.25"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 内阴影效果 -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feFlood flood-color="#000000" flood-opacity="0.1"/>
      <feComposite in2="offset-blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#mainBg)"/>
  
  <!-- 装饰性光晕效果 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- 文档主体 -->
  <rect x="140" y="100" width="232" height="312" rx="16" ry="16" 
        fill="url(#docBg)" 
        stroke="rgba(255,255,255,0.2)" 
        stroke-width="1" 
        filter="url(#docShadow)"/>
  
  <!-- 文档顶部装饰条 -->
  <rect x="140" y="100" width="232" height="40" rx="16" ry="16" 
        fill="url(#smartGradient)" opacity="0.1"/>
  
  <!-- 现代化折角设计 -->
  <path d="M340 100 L372 100 Q372 100 372 116 L372 132 Q356 116 340 116 Z" 
        fill="rgba(148,163,184,0.3)"/>
  <path d="M340 116 L356 116 L372 132" 
        fill="none" stroke="rgba(148,163,184,0.5)" stroke-width="1"/>
  
  <!-- 文档内容 - 标题 -->
  <rect x="170" y="160" width="140" height="8" rx="4" fill="url(#smartGradient)"/>
  
  <!-- 文档内容 - 段落 -->
  <rect x="170" y="190" width="180" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="170" y="210" width="160" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="170" y="230" width="190" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="170" y="250" width="150" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="170" y="270" width="170" height="4" rx="2" fill="#cbd5e1"/>
  
  <!-- 智能AI标识 -->
  <g transform="translate(290, 320)">
    <!-- AI芯片背景 -->
    <rect x="-20" y="-20" width="40" height="40" rx="8" 
          fill="url(#smartGradient)" opacity="0.15"/>
    
    <!-- AI核心图标 -->
    <circle cx="0" cy="0" r="12" fill="url(#smartGradient)" opacity="0.2"/>
    
    <!-- 神经网络节点 -->
    <circle cx="-8" cy="-8" r="2" fill="url(#smartGradient)"/>
    <circle cx="8" cy="-8" r="2" fill="url(#smartGradient)"/>
    <circle cx="-8" cy="8" r="2" fill="url(#smartGradient)"/>
    <circle cx="8" cy="8" r="2" fill="url(#smartGradient)"/>
    <circle cx="0" cy="0" r="3" fill="url(#smartGradient)"/>
    
    <!-- 连接线 -->
    <line x1="-8" y1="-8" x2="0" y2="0" stroke="url(#smartGradient)" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="-8" x2="0" y2="0" stroke="url(#smartGradient)" stroke-width="1" opacity="0.6"/>
    <line x1="-8" y1="8" x2="0" y2="0" stroke="url(#smartGradient)" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="8" x2="0" y2="0" stroke="url(#smartGradient)" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- 现代装饰元素 -->
  <circle cx="120" cy="140" r="2" fill="rgba(6,182,212,0.6)"/>
  <circle cx="400" cy="180" r="3" fill="rgba(6,182,212,0.4)"/>
  <circle cx="110" cy="300" r="1.5" fill="rgba(6,182,212,0.5)"/>
  <circle cx="410" cy="320" r="2.5" fill="rgba(6,182,212,0.3)"/>
  <circle cx="120" cy="320" r="2" fill="#667eea" opacity="0.8"/>
  
  <!-- 光效 -->
  <ellipse cx="256" cy="180" rx="80" ry="20" fill="url(#accentGradient)" opacity="0.1"/>
</svg>